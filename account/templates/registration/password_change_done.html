{% extends "base.html" %}

{% block title %}비밀번호 변경 완료{% endblock %}

{% block content %}
<div class="password-changed-container">
    <h1>비밀번호 변경 완료</h1>
    <p>비밀번호가 성공적으로 변경되었습니다.</p>
    <a href="{% url 'account:mypage' %}" class="btn-back">마이페이지로 돌아가기</a>
</div>

<style>
    /* 비밀번호 변경 완료 컨테이너 */
    .password-changed-container {
        width: 50%;
        margin: 0 auto;
        padding: 30px;
        text-align: center;
        background: #f9f9f9;
        border-radius: 10px;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        margin-top: 50px;
    }

    .password-changed-container h1 {
        font-size: 24px;
        color: #333;
        margin-bottom: 20px;
    }

    .password-changed-container p {
        font-size: 16px;
        color: #555;
        margin-bottom: 30px;
    }

    /* 버튼 스타일 */
    .btn-back {
        display: inline-block;
        padding: 10px 20px;
        font-size: 16px;
        color: #fff;
        background-color: #007bff;
        text-decoration: none;
        border-radius: 5px;
        transition: background-color 0.3s ease;
    }

    .btn-back:hover {
        background-color: #0056b3;
    }
</style>
{% endblock %}
