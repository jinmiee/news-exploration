{% extends "base.html" %}
{% load static %}

{% block head %}
<link href="{% static 'css/auth.css' %}" rel="stylesheet">
{% endblock %}

{% block title %}회원가입{% endblock %}

{% block content %}
<div class="auth-container">
    <h1>회원가입</h1>
    <p>아래 양식을 작성하여 회원가입을 완료해주세요:</p>    
    <form method="post" class="auth-form">
        {% csrf_token %}
        {{ user_form.as_p }}
        <input type="submit" value="가입하기">
    </form>
</div>
{% endblock %}
