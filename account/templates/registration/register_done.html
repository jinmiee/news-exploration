{% extends "base.html" %}
{% load static %}

{% block head %}
<link href="{% static 'css/auth.css' %}" rel="stylesheet">
{% endblock %}

{% block title %}가입 완료{% endblock %}

{% block content %}
<div class="auth-container">
    <h1>환영합니다, {{ new_user.first_name }}님!</h1>
    <p>회원가입이 성공적으로 완료되었습니다.
        이제 <a href="{% url 'account:login' %}">로그인</a>하실 수 있습니다.
    </p>
</div>
{% endblock %}
