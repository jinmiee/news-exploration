{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'css/base.css' %}">
</head>
<body>
    <div id="header">
        <span class="logo">NEWS</span>
        {% if request.user.is_authenticated %}
            <ul class="menu">
                
                <li {% if section == "chart" %}class="selected"{% endif %}>
                    <a href="{% url 'account:chart' %}">차트</a>
                </li>
                <li {% if section == "emotion" %}class="selected"{% endif %}>
                    <a href="{% url 'account:emotion' %}">감정분석</a>
                </li>
                <li {% if section == "relate" %}class="selected"{% endif %}>
                    <a href="{% url 'account:relate' %}">연관어분석</a>
                </li>
                
            </ul>
        {% endif %}
        <span class="user">
            {% if request.user.is_authenticated %}
            <form method="post" action="{% url 'account:logout' %}">
                {% csrf_token %}
                <button type="submit">Logout</button>
            </form>
            <a href="{% url 'account:mypage' %}"style="margin-right: 10px;">마이페이지</a>
            {% endif %}
            
        </span>
    </div>
    <div id="content">
        {% block content %}
        {% endblock %}
    </div>
</body>
</html>
