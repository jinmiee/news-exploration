{% load static %}
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{% endblock %}</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/base.css' %}">
    {% block head %}{% endblock %}
</head>
<body>
    <div class="container">
        <nav class="navbar">
            <div class="navbar-container">
                <a href="{% url 'account:chart' %}" class="navbar-brand">뉴스 분석</a>
                <div class="navbar-menu">
                    <a href="{% url 'account:chart' %}" class="nav-link {% if section == 'chart' %}active{% endif %}">차트</a>
                    <a href="{% url 'account:weekly_issues' %}" class="nav-link {% if section == 'weekly_issues' %}active{% endif %}">주간 이슈</a>
                    <a href="{% url 'account:mypage' %}" class="nav-link {% if section == 'mypage' %}active{% endif %}">마이페이지</a>
                    {% if user.is_authenticated %}
                        <div class="user-menu">
                            <a href="{% url 'account:logout' %}" class="btn-login">로그아웃</a>
                        </div>
                    {% else %}
                        <div class="auth-buttons">
                            <a href="{% url 'account:login' %}" class="btn-login">로그인</a>
                        </div>
                    {% endif %}
                </div>
            </div>
        </nav>

        <main>
            {% block content %}
            {% endblock %}
        </main>
    </div>
</body>
</html>
