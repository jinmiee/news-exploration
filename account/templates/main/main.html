{% load static %}

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>뉴스대탐험 소개</title>
    <style>
        body {
            margin: 0;
            padding: 0;
        }
        .image-container img {
            width: 100%; /* 화면 너비에 딱 맞게 설정 */
            height: auto; /* 이미지 비율 유지 */
            margin: 0;
            padding: 0;
        }
    </style>
</head>
<body>
    <div class="image-container">
        <!-- 첫 번째 이미지 -->
        <img src="{% static 'images/Main.png'%}" alt="Main Image" usemap="#main-map">

        <!-- 이미지에 맵핑된 링크 -->
        <map name="main-map">
            <!-- 로그인 버튼 영역 (x1, y1, x2, y2) -->
            <area shape="rect" coords="493,1143,583,1168" href="{% url 'account:login' %}" alt="로그인">
            <!-- 뉴스 보러 가기 버튼 영역 -->
            <area shape="rect" coords="596,1143,685,1168" href="{% url 'account:chart' %}" alt="뉴스 보러 가기">
        </map>
    </div>

    <div class="image-container">
        <!-- 두 번째 이미지 -->
        <img src="{% static 'images/service.jpg' %}" alt="Service Image">
    </div>
</body>

<script>
    window.onload = function () {
    const image = document.querySelector('img[usemap="#main-map"]');
    const map = document.querySelector('map[name="main-map"]');
    const originalWidth = 1178; // 이미지의 원본 너비
    const originalHeight = 1870.46; // 이미지의 원본 높이

    const areas = map.querySelectorAll('area');

    function resizeMap() {
        const currentWidth = image.clientWidth;
        const currentHeight = image.clientHeight;

        const widthRatio = currentWidth / originalWidth;
        const heightRatio = currentHeight / originalHeight;

        areas.forEach(area => {
            const coords = area.getAttribute('data-original-coords').split(',').map(Number);
            const newCoords = coords.map((coord, index) =>
                index % 2 === 0 ? coord * widthRatio : coord * heightRatio
            );
            area.setAttribute('coords', newCoords.join(','));
        });
    }

    // 초기 좌표 저장
    areas.forEach(area => {
        if (!area.getAttribute('data-original-coords')) {
            area.setAttribute('data-original-coords', area.getAttribute('coords'));
        }
    });

    // 창 크기 변경 시 좌표 조정
    window.addEventListener('resize', resizeMap);

    // 초기 실행
    resizeMap();
};
</script>
</html>
