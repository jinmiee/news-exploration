<form method="post" action="{% url 'account:submit_feedback' %}" class="feedback-form">
    {% csrf_token %}
    
    <div class="form-group feedback-top-section">
        <!-- 별점 입력 -->
        <label class="feedback-label">사용경험을 표현해주세요!</label>
        <div class="star-rating">
            <input type="radio" id="star5" name="rating" value="5">
            <label for="star5" title="5점">★</label>
            <input type="radio" id="star4" name="rating" value="4">
            <label for="star4" title="4점">★</label>
            <input type="radio" id="star3" name="rating" value="3">
            <label for="star3" title="3점">★</label>
            <input type="radio" id="star2" name="rating" value="2">
            <label for="star2" title="2점">★</label>
            <input type="radio" id="star1" name="rating" value="1" required>
            <label for="star1" title="1점">★</label>
        </div>
    </div>

    <!-- 피드백 텍스트 -->
    <div class="form-group feedback-bottom-section">
        <label for="feedback" class="feedback-label">사용하면서 좋았던 점이나 아쉬운 점을 말해주세요</label>
        <textarea id="feedback" name="feedback" rows="4" class="feedback-textarea" placeholder="여기에 피드백을 작성하세요..." required></textarea>
    </div>

    <button type="submit" class="btn-submit">제출</button>
</form>

<style>
    /* 피드백 폼 컨테이너 */
    .feedback-form {
        margin-top: 20px;
        padding: 20px;
        background: #f9f9f9;
        border: 1px solid #ddd;
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
    }

    /* 라벨 스타일 */
    .feedback-label {
        display: block;
        margin-bottom: 10px;
        font-size: 16px;
        font-weight: bold;
        color: #333;
    }

    /* 별점 입력 영역 */
    .star-rating {
        display: flex;
        flex-direction: row-reverse; /* 오른쪽에서 왼쪽으로 표시 */
        justify-content: flex-end;  /* 별점을 오른쪽 정렬 */
        gap: 5px;
    }

    .star-rating input {
        display: none; /* 라디오 버튼 숨기기 */
    }

    .star-rating label {
        font-size: 24px;
        color: #ccc; /* 기본 별 색상 */
        cursor: pointer;
        transition: color 0.2s;
    }

    .star-rating input:checked ~ label {
        color: #007bff; /* 선택된 별 색상 */
    }

    .star-rating input:checked ~ label:hover,
    .star-rating input:hover ~ label {
        color: #0056b3; /* 호버 시 별 색상 */
    }

    .star-rating label:hover,
    .star-rating label:hover ~ label {
        color: #0056b3; /* 호버 시 별 색상 */
    }

    /* 텍스트 영역 스타일 */
    .feedback-textarea {
        width: 100%;
        height: 80px;
        padding: 10px;
        font-size: 14px;
        border: 1px solid #ddd;
        border-radius: 4px;
        box-sizing: border-box;
        resize: none;
        font-family: 'Arial', sans-serif;
    }

    .feedback-textarea:focus {
        outline: none;
        border-color: #007bff;
    }

    /* 제출 버튼 스타일 */
    .btn-submit {
        margin-top: 15px;
        display: block;
        width: 100%;
        padding: 10px 20px;
        font-size: 16px;
        color: #fff;
        background-color: #007bff;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        text-align: center;
        transition: background-color 0.3s ease;
    }

    .btn-submit:hover {
        background-color: #0056b3;
    }

    /* 반응형 스타일 */
    @media (max-width: 768px) {
        .feedback-form {
            padding: 15px;
        }

        .feedback-label {
            font-size: 14px;
        }

        .feedback-textarea {
            font-size: 13px;
        }

        .btn-submit {
            font-size: 14px;
        }

        .star-rating label {
            font-size: 20px;
        }
    }
</style>
