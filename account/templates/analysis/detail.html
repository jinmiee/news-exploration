{% extends "base.html" %}

{% block title %}YouTube News Detail{% endblock %}

{% block content %}
    <h1>YouTube News Detail</h1>
  
    <h2>{{ video_title }}</h2>
    <!-- video-container를 flex로 설정하여 영상과 정보를 나란히 배치 -->
    <div id="video-container" style="display: flex; align-items: center; justify-content: space-between; margin-top: 20px;">
        <!-- 영상 임베드 -->
        <iframe id="video-frame" width="560" height="315" src="https://www.youtube.com/embed/{{ video_id }}" frameborder="0" allowfullscreen></iframe>
        
        <!-- 오른쪽에 표시될 views와 likes -->
        <div style="margin-left: 20px;">
            <!-- Views -->
            <p style="font-size: 20px; font-weight: bold; color: #FF5733;">
                <i class="fas fa-eye" style="color: #FF5733; margin-right: 10px;"></i>
                Views: <span style="font-size: 24px; color: #FF5733;">{{ video_views }}</span>
            </p>

            <!-- Likes -->
            <p style="font-size: 20px; font-weight: bold; color: #FF9800;">
                <i class="fas fa-thumbs-up" style="color: #FF9800; margin-right: 10px;"></i>
                Likes: <span style="font-size: 24px; color: #FF9800;">{{ video_likes }}</span>
            </p>
        </div>
    </div>

    

    <p style="margin-top: 20px;">
        <a href="{% url 'account:chart' %}">Back to Chart</a>
    </p>

{% endblock %}
